<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiet Archive</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&family=Caveat:wght@400&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #fffdf8;
      --text: #2f2a26;
      --accent-red: #8b3a3a;
      --accent-red-light: #a84c4c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      height: 100vh;
      overflow: hidden;

      /* LIGHTER WOOD */
      background:
        linear-gradient(90deg, #8a6a4f 0%, #a0785a 50%, #8a6a4f 100%);
      position: relative;
    }

    /* subtle wood grain */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.03),
          rgba(255,255,255,0.03) 2px,
          transparent 2px,
          transparent 8px
        );
      pointer-events: none;
    }

    /* soft grain */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(0,0,0,0.08) 1px, transparent 1px);
      background-size: 3px 3px;
      opacity: 0.12;
      pointer-events: none;
    }

    h1 {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #f4efe6;
      opacity: 0.85;
      z-index: 10;
    }

    /* PAPER BASE */
    .card {
      position: absolute;
      padding: 1.5rem;
      background: linear-gradient(145deg, #fffdf8, #f3eee6);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
      transition: all 0.25s ease;
      border-left: 3px solid transparent;
      display: flex;
	  background:
			linear-gradient(145deg, #fffdf8, #f3eee6),
			linear-gradient(90deg, rgba(0,0,0,0.02), transparent);
      flex-direction: column;
      justify-content: center;
    }

    /* paper texture */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(0,0,0,0.015),
          rgba(0,0,0,0.015) 1px,
          transparent 1px,
          transparent 4px
        );
      border-radius: 6px;
      pointer-events: none;
    }

    .card:hover {
      transform: scale(1.05) rotate(0deg);
      z-index: 20;
      box-shadow: 0 15px 30px rgba(0,0,0,0.35);
      border-left-color: var(--accent-red);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .card-subtitle {
      font-size: 0.75rem;
      color: #6b6560;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* INDIVIDUAL PAPERS */

    .poems {
      top: 18%;
      left: 12%;
      width: 220px;
      height: 140px;
      transform: rotate(-6deg);
    }

    .poems .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
    }

    .thoughts {
      top: 28%;
      left: 58%;
      width: 200px;
      height: 140px;
      transform: rotate(5deg);
    }

    .thoughts .card-title {
      font-family: 'Inter', sans-serif;
    }

    .fragments {
      top: 58%;
      left: 20%;
      width: 200px;
      height: 140px;
      transform: rotate(8deg);
    }

    .fragments .card-title {
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
    }

    .logs {
      top: 62%;
      left: 65%;
      width: 210px;
      height: 140px;
      transform: rotate(-4deg);
    }

    .logs .card-title {
      font-family: 'Inter', sans-serif;
    }

    .locked {
      top: 45%;
      left: 42%;
      width: 190px;
      height: 140px;
      transform: rotate(2deg);
      opacity: 1;
	  filter: grayscale(30%);
    }

    .locked .card-title {
      font-family: 'Playfair Display', serif;
      color: #a0938a;
    }

    .locked .card-subtitle {
      color: #9a8d84;
    }

    footer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      color: var(--accent-red);
      opacity: 0.7;
      font-weight: 300;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <h1>quiet archive</h1>

  <a href="poems.html" class="card poems">
    <span class="card-title">Poems & Stories</span>
    <span class="card-subtitle">NOTEBOOK</span>
  </a>

  <a href="thoughts.html" class="card thoughts">
    <span class="card-title">Thoughts</span>
    <span class="card-subtitle">FLEETING IDEAS</span>
  </a>

  <a href="fragments.html" class="card fragments">
    <span class="card-title">Fragments</span>
    <span class="card-subtitle">UNFINISHED</span>
  </a>

  <a href="logs.html" class="card logs">
    <span class="card-title">Logs</span>
    <span class="card-subtitle">SYSTEM OF SELF</span>
  </a>

  <a href="locked.html" class="card locked">
    <span class="card-title">Locked</span>
    <span class="card-subtitle">PRIVATE</span>
  </a>

  <footer>a place to return to</footer>

</body>
</html>
