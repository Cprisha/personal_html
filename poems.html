<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poems & Stories</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Cormorant+Garamond:wght@400;600&family=Caveat:wght@400&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #fdfaf4;
      --text: #2f2a26;
      --accent: #8b3a3a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'EB Garamond', serif;
      color: var(--text);
      height: 100vh;
      display: flex;
      background: linear-gradient(90deg, #8a6a4f 0%, #a0785a 50%, #8a6a4f 100%);
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      padding: 2rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: rgba(255, 253, 248, 0.85);
      box-shadow: inset -5px 0 10px rgba(0,0,0,0.08);
      backdrop-filter: blur(2px);
      overflow-y: auto;
      max-height: 100vh;
    }

    /* Scrollbar styling for sidebar */
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 3px;
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: #a84c4c;
    }

    .tab {
      padding: 0.6rem 0.8rem;
      background: #fffdf8;
      cursor: pointer;
      font-size: 0.95rem;
      border-left: 3px solid transparent;
      transition: all 0.2s ease;
      border-radius: 3px;
    }

    .tab:hover {
      border-left: 3px solid var(--accent);
      transform: translateX(4px);
      background: #f9f6f1;
    }

    .tab.active {
      border-left: 3px solid var(--accent);
      background: #f7f2ea;
      font-weight: 500;
    }

    /* MAIN NOTEBOOK */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 2rem;
    }

    .page {
      width: 650px;
      min-height: 420px;
      background: linear-gradient(145deg, #fffdf8, #efe9df);
      padding: 2.8rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      position: relative;
    }

    /* paper texture */
    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(0,0,0,0.01),
          rgba(0,0,0,0.01) 1px,
          transparent 1px,
          transparent 6px
        );
      pointer-events: none;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
	  font-weight: 700;
      margin-bottom: 0.5rem;
      padding-bottom: 1rem;
	  padding-top: 3.5rem;
      border-bottom: 2px solid var(--accent);
      color: var(--text);
    }

    .content {
      line-height: 1.8;
      white-space: pre-line;
      font-size: 1.05rem;
      margin-top: 1.5rem;
    }

    /* back button */
    .back {
      position: absolute;
      top: 2rem;
      left: 2rem;
      font-size: 0.95rem;
      text-decoration: none;
      color: var(--text);
      font-family: 'EB Garamond', serif;
      background: rgba(255, 253, 248, 0.9);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: all 0.2s ease;
      z-index: 15;
    }

    .back:hover {
      background: rgba(255, 253, 248, 1);
      color: var(--accent);
      transform: translateX(-4px);
    }
  </style>
</head>

<body>

  <div class="sidebar" id="tabs"></div>

  <div class="main">
    <a href="index.html" class="back">← back</a>

    <div class="page">
      <div class="title" id="title"></div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <script>
    const entries = [
      {
        title: "Just a Doll",
        content: `Playing with emotions
Breaking people's hearts
It wasn't just a hobby
To her, it was an art

With legs in his lap
With him in her call logs
She couldn't be his
To him, she was just a doll

The broken heart gone eerie
Her cries unseen, unheard
Did she deserve what she got?
Or was she the one at fault?`
      },
      {
        title: "That Gave a White Dove",
        content: `Look at how things turned out
Should have considered the locus
Might have found a breakout
And now I just can't focus

Why did I even take the risk
Forgetting the possibility
That I might think I am sick
After exhausting my ability

All my efforts in vain
I wasted money and time
Self-respect in the drain
It feels like a crime

Oh, one way for emotion
And no way for love
I wish I brewed a potion
That gave a white dove`
      },
      {
        title: "A Shattered Heart Not So Broken",
        content: `The shadows whispered as the trees stood still
Owls and bats shared secrets in silence
Nobles and witty lost their senses
For born was a queen, leaving everyone in flaw

The night was small, and so were the talks
The girl once complete was now broken
The shattered ruins of her heart remained
Fixed temporarily with cello tape

Was she a lover, or a damsel left broken?
Questions were posed over the seasons
She chose silence as a last resort
Answers awaited, but soon forgotten

She grew up wary of her surroundings
She lived like nothing ever happened
She was dressed under a facade
A resolution she was not to break`
      }
    ];

    const tabsContainer = document.getElementById("tabs");
    const titleEl = document.getElementById("title");
    const contentEl = document.getElementById("content");

    function loadEntry(index) {
      const entry = entries[index];
      titleEl.innerText = entry.title;
      contentEl.innerText = entry.content;

      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      document.querySelectorAll(".tab")[index].classList.add("active");
    }

    entries.forEach((entry, index) => {
      const tab = document.createElement("div");
      tab.className = "tab";
      tab.innerText = entry.title;
      tab.onclick = () => loadEntry(index);
      tabsContainer.appendChild(tab);
    });

    loadEntry(0);
  </script>

</body>
</html>
